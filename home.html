<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - NakHeng Electronic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Floating particles background */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .welcome-container {
            text-align: center;
            background: white;
            padding: 80px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            position: relative;
            z-index: 10;
            animation: fadeInScale 1s ease;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .emoji-top {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .welcome-title {
            font-size: 56px;
            color: #031249;
            margin-bottom: 20px;
            font-weight: 700;
            animation: slideInLeft 0.8s ease;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .welcome-title .highlight {
            color: #0088ff;
            display: inline-block;
            animation: colorPulse 3s ease-in-out infinite;
        }

        @keyframes colorPulse {
            0%, 100% {
                color: #0088ff;
            }
            50% {
                color: #0066cc;
            }
        }

        .welcome-subtitle {
            font-size: 24px;
            color: #64748b;
            margin-bottom: 30px;
            animation: slideInRight 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .emoji-inline {
            font-size: 28px;
            display: inline-block;
            animation: rotate 3s ease-in-out infinite;
        }

        @keyframes rotate {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-15deg);
            }
            75% {
                transform: rotate(15deg);
            }
        }

        .welcome-message {
            font-size: 20px;
            color: #475569;
            line-height: 1.8;
            animation: fadeIn 1.2s ease;
            margin-bottom: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .emoji-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .emoji-item {
            font-size: 60px;
            display: inline-block;
            animation: popIn 0.6s ease;
            transition: transform 0.3s ease;
        }

        .emoji-item:nth-child(1) {
            animation-delay: 0.2s;
        }

        .emoji-item:nth-child(2) {
            animation-delay: 0.4s;
        }

        .emoji-item:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .emoji-item:hover {
            transform: scale(1.3) rotate(10deg);
        }

        @media (max-width: 768px) {
            .welcome-container {
                padding: 60px 40px;
            }

            .emoji-top {
                font-size: 60px;
            }

            .welcome-title {
                font-size: 42px;
            }

            .welcome-subtitle {
                font-size: 20px;
            }

            .emoji-inline {
                font-size: 24px;
            }

            .welcome-message {
                font-size: 18px;
            }

            .emoji-item {
                font-size: 50px;
            }

            .emoji-row {
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .welcome-container {
                padding: 40px 30px;
            }

            .emoji-top {
                font-size: 50px;
            }

            .welcome-title {
                font-size: 32px;
            }

            .welcome-subtitle {
                font-size: 18px;
                flex-direction: column;
            }

            .emoji-inline {
                font-size: 22px;
            }

            .welcome-message {
                font-size: 16px;
            }

            .emoji-item {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <script>
        for(let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            document.body.appendChild(particle);
        }
    </script>

    <div class="welcome-container">
        <div class="emoji-top">👋</div>
        
        <h1 class="welcome-title">
            Welcome to <span class="highlight">NakHeng</span>
        </h1>
        
        <p class="welcome-subtitle">
            <span class="emoji-inline">⚡</span>
            Electronic Learning Platform
            <span class="emoji-inline">💡</span>
        </p>
        
        <p class="welcome-message">
            Select a category from the menu above to explore components and projects. 
            Start your electronic journey today! 🚀
        </p>

        <div class="emoji-row">
            <span class="emoji-item">🔌</span>
            <span class="emoji-item">🤖</span>
            <span class="emoji-item">🛠️</span>
        </div>
    </div>
</body>
</html>
